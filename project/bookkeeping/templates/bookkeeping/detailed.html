{% extends 'base.html' %}

{% load i18n %}


{% block head %}{% endblock head %}


{% block content %}
    <main class="grid-one-col">

        <div>
            <c-detailed-table
                :title=income.title
                :url_title=income.url_title
                :data=income.data
                :total=income.total
            />
        </div>

        <div>
            <c-detailed-table
                :title=saving.title
                :url_title=saving.url_title
                :data=saving.data
                :total=saving.total
            />
        </div>

        {% for expense_row in expense %}
        <div>
            <c-detailed-table
                :title=expense_row.title
                :url_title=expense_row.url_title
                :data=expense_row.data
                :total=expense_row.total
            />
        </div>
        {% endfor %}

    </main>
{% endblock content %}
