<c-vars field />
{% load i18n %}

<c-field-wrapper :field="field">
    {% if field.value %}
        <div class="input-group">
            <span class="input-group-text">{% translate "Currently" %}</span>

            <div class="form-control">
                <a href="{{ field.value.url }}">{{ field.value }}</a>
                {% if not field.field.required %}
                    <div class="form-check">
                        <input type="checkbox" name="{{ field.html_name }}-clear" id="{{ field.html_name }}-clear_id" class="form-check-input">
                        <label for="{{ field.html_name }}-clear_id" style="margin-bottom: 0;">
                            {% translate "Clear" %}
                        </label>
                    </div>
                {% endif %}
            </div>
        </div>
    {% endif %}

    <input type="file" name="{{ field.html_name }}" class="form-control {% if field.errors %}is-invalid{% endif %}" id="{{ field.id_for_label }}" {% if field.field.required and not field.value %}required{% endif %}>
</c-field-wrapper>
